<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Footy Association</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:   #1a1a1a;
    --navy2:  #242424;
    --green:  #fe627e;
    --green2: #ff7d94;
    --gold:   #379bff;
    --slate:  #3a3a3a;
    --tile-bg: #2a2a2a;
    --tile-hover: #333333;
    --white:  #f4f7fa;
    --muted:  #8a8a9a;
  }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  header { text-align: center; margin-bottom: 8px; }
  .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.2rem, 6vw, 3.2rem);
    letter-spacing: 0.06em;
    color: var(--white);
    line-height: 1;
  }
  .brand span { color: var(--green); }
  .subtitle {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }
  .puzzle-meta {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }
  .game-headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    color: #379bff;
    letter-spacing: 0.06em;
    text-align: center;
    margin-bottom: 8px;
  }
  .instruction {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 16px;
    text-align: center;
    max-width: 420px;
    line-height: 1.5;
  }
  .mistakes-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 22px;
    margin-bottom: 14px;
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .lives { display: flex; gap: 6px; }
  .life {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--green2);
    transition: background 0.3s, transform 0.2s;
  }
  .life.lost { background: var(--slate); transform: scale(0.8); }

  #board { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 8px; }

  .group-row {
    border-radius: 10px;
    padding: 14px 18px;
    text-align: center;
    animation: revealGroup 0.4s ease;
    margin-bottom: 6px;
  }
  .group-row .group-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.85;
    margin-bottom: 4px;
  }
  .group-row .group-words {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  #tile-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .tile {
    background: var(--tile-bg);
    border-radius: 10px;
    padding: 10px 6px;
    min-height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border: 2px solid transparent;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    user-select: none;
    color: var(--white);
    line-height: 1.3;
  }
  .tile:hover { background: var(--tile-hover); }
  .tile.selected { background: var(--gold); color: var(--navy); border-color: var(--gold); }
  .tile.shake { animation: shake 0.4s ease; }
  .tile.pop   { animation: pop   0.3s ease; }

  .btn-row {
    display: flex; gap: 10px;
    margin-top: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 22px;
    border-radius: 999px;
    border: 2px solid var(--slate);
    background: transparent;
    color: var(--white);
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: var(--slate); }
  .btn.primary { background: var(--green); border-color: var(--green); color: #fff; }
  .btn.primary:hover { background: var(--green2); border-color: var(--green2); }
  .btn:disabled { opacity: 0.35; cursor: default; }

  #toast {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--white);
    color: var(--navy);
    font-weight: 700;
    font-size: 0.88rem;
    padding: 10px 24px;
    border-radius: 999px;
    letter-spacing: 0.04em;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  #end-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    text-align: center;
    width: 100%;
    max-width: 560px;
    margin-top: 12px;
  }
  #end-screen.visible { display: flex; }
  .end-headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 0.06em;
    color: var(--white);
  }
  .share-box {
    background: var(--navy2);
    border-radius: 12px;
    padding: 18px 24px;
    font-size: 1.4rem;
    line-height: 1.1;
    letter-spacing: 0.08em;
    border: 1px solid var(--slate);
    min-width: 200px;
  }
  .share-label {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  @keyframes pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  @keyframes revealGroup {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 420px) {
    .tile { min-height: 60px; font-size: 0.65rem; padding: 8px 4px; }
    .brand { font-size: 2rem; }
  }
</style>
</head>

function getProgress() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { completed: [], current: 0 };
  } catch(e) {
    return { completed: [], current: 0 };
  }
}

function saveProgress(matchweekIdx) {
  const p = getProgress();
  if (!p.completed.includes(matchweekIdx)) p.completed.push(matchweekIdx);
  // Find next uncompleted
  let next = (matchweekIdx + 1) % BOARD_ORDER.length;
  let loops = 0;
  while (p.completed.includes(next) && loops < BOARD_ORDER.length) {
    next = (next + 1) % BOARD_ORDER.length;
    loops++;
  }
  // If all completed, reset
  if (loops >= BOARD_ORDER.length) {
    p.completed = [];
    next = 0;
  }
  p.current = next;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}

function getNextMatchweek() {
  const p = getProgress();
  return p.current;
}

// ─────────────────────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────────────────────
const MAX_MISTAKES = 4;
let PUZZLE, puzzleNumber, lives, tiles, selected, solvedGroups, guessHistory, gameOver;

let currentMatchweek = null;

function initGame(matchweekIdx) {
  if (matchweekIdx === undefined) matchweekIdx = getNextMatchweek();
  currentMatchweek = matchweekIdx;
  PUZZLE = PUZZLES[BOARD_ORDER[matchweekIdx]];
  puzzleNumber = matchweekIdx;
  document.getElementById('end-screen').classList.remove('visible');
  document.getElementById('tile-grid').style.display = 'grid';


  lives = MAX_MISTAKES;
  selected = [];
  solvedGroups = [];
  guessHistory = [];
  gameOver = false;

  tiles = [];
  PUZZLE.groups.forEach((g, gi) => {
    g.tiles.forEach(t => tiles.push({ text: t, groupIndex: gi }));
  });

  shuffle(tiles);
  renderBoard();
  renderLives();
  document.getElementById('btn-submit').disabled = true;
}

// ─────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────
function renderBoard() {
  const grid = document.getElementById('tile-grid');
  grid.innerHTML = '';
  document.getElementById('revealed').innerHTML = '';

  solvedGroups.forEach(gi => renderGroupRow(gi));

  tiles.forEach((tile, idx) => {
    if (solvedGroups.includes(tile.groupIndex)) return;
    const el = document.createElement('div');
    el.className = 'tile';
    el.dataset.idx = idx;
    el.textContent = tile.text;
    if (selected.includes(idx)) el.classList.add('selected');
    el.addEventListener('click', () => onTileClick(idx, el));
    grid.appendChild(el);
  });
}

function renderGroupRow(gi) {
  const g = PUZZLE.groups[gi];
  const row = document.createElement('div');
  row.className = 'group-row';
  row.style.background = '#fe627e';
  row.style.color = '#fff';
  row.innerHTML = `
    <div class="group-label">${escHtml(g.label)}</div>
    <div class="group-words">${g.tiles.map(escHtml).join(' &bull; ')}</div>
  `;
  document.getElementById('revealed').appendChild(row);
}

function renderLives() {
  const el = document.getElementById('lives');
  el.innerHTML = '';
  for (let i = 0; i < MAX_MISTAKES; i++) {
    const dot = document.createElement('div');
    dot.className = 'life' + (i >= lives ? ' lost' : '');
    el.appendChild(dot);
  }
}

// ─────────────────────────────────────────────────────────────
// INTERACTIONS
// ─────────────────────────────────────────────────────────────
function onTileClick(idx, el) {
  if (gameOver) return;
  if (solvedGroups.includes(tiles[idx].groupIndex)) return;

  if (selected.includes(idx)) {
    selected = selected.filter(i => i !== idx);
    el.classList.remove('selected');
  } else {
    if (selected.length >= 4) return;
    selected.push(idx);
    el.classList.add('selected');
    el.classList.add('pop');
    el.addEventListener('animationend', () => el.classList.remove('pop'), { once: true });
  }
  document.getElementById('btn-submit').disabled = selected.length !== 4;
}

document.getElementById('btn-shuffle').addEventListener('click', () => {
  const remaining = tiles.filter(t => !solvedGroups.includes(t.groupIndex));
  shuffle(remaining);
  let ri = 0;
  tiles = tiles.map(t => solvedGroups.includes(t.groupIndex) ? t : remaining[ri++]);
  selected = [];
  renderBoard();
  document.getElementById('btn-submit').disabled = true;
});

document.getElementById('btn-deselect').addEventListener('click', () => {
  selected = [];
  renderBoard();
  document.getElementById('btn-submit').disabled = true;
});

document.getElementById('btn-submit').addEventListener('click', onSubmit);

function onSubmit() {
  if (selected.length !== 4 || gameOver) return;

  const groups = selected.map(i => tiles[i].groupIndex);
  const allSame = groups.every(g => g === groups[0]);

  const isCorrectGuess = allSame; const row = [isCorrectGuess ? CORRECT_SQUARE : WRONG_SQUARE, isCorrectGuess ? CORRECT_SQUARE : WRONG_SQUARE, isCorrectGuess ? CORRECT_SQUARE : WRONG_SQUARE, isCorrectGuess ? CORRECT_SQUARE : WRONG_SQUARE];
  guessHistory.push(row);

  if (allSame) {
    const gi = groups[0];
    solvedGroups.push(gi);
    selected = [];
    renderGroupRow(gi);
    tiles = tiles.filter(t => !(!solvedGroups.includes(t.groupIndex) && t.groupIndex === gi));
    renderBoard();
    document.getElementById('btn-submit').disabled = true;
    showToast('Correct!');
    if (solvedGroups.length === PUZZLE.groups.length) setTimeout(endGame, 600);
  } else {
    const freq = {};
    groups.forEach(g => freq[g] = (freq[g] || 0) + 1);
    const maxFreq = Math.max(...Object.values(freq));

    lives--;
    renderLives();

    document.querySelectorAll('.tile.selected').forEach(el => {
      el.classList.add('shake');
      el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
    });

    showToast(maxFreq === 3 ? 'One away...' : maxFreq === 2 ? 'Two away...' : 'Not quite!');

    selected = [];
    setTimeout(() => {
      renderBoard();
      document.getElementById('btn-submit').disabled = true;
      if (lives === 0) setTimeout(endGame, 300);
    }, 450);
  }
}

// ─────────────────────────────────────────────────────────────
// END GAME
// ─────────────────────────────────────────────────────────────
function endGame() {
  gameOver = true;
  const won = solvedGroups.length === PUZZLE.groups.length;
  if (won) saveProgress(currentMatchweek);

  document.getElementById('end-headline').textContent = won
    ? (lives === MAX_MISTAKES ? 'Perfect score!' : 'Well played!')
    : 'Better luck next time';

  const shareLines = guessHistory.map(row => {
    return '<div style="display:flex;gap:3px;justify-content:center;margin-bottom:3px;">' +
      row.map(sq => {
        const bg = sq === CORRECT_SQUARE ? '#fe627e' : '#2a2a2a';
        return `<div style="width:28px;height:28px;border-radius:4px;background:${bg};"></div>`;
      }).join('') +
    '</div>';
  }).join('');
  document.getElementById('share-grid').innerHTML = shareLines;
  const mistakesMade = MAX_MISTAKES - lives;
  const strikeLabels = ['Beautiful Game','Single Strike','Double Strike','Triple Strike','Strike Out!'];
  const strikeLabel = won ? strikeLabels[mistakesMade] : 'Strike Out!';
  document.getElementById('share-label').textContent = `Game ${currentMatchweek + 1} - ${strikeLabel}`;

  document.getElementById('end-screen').classList.add('visible');
  document.getElementById('tile-grid').style.display = 'none';
}

document.getElementById('btn-copy').addEventListener('click', () => {
  const lines = guessHistory.map(row => row.map(sq => sq === CORRECT_SQUARE ? '🟫' : '⬛').join('')).join('\n');
  const mistakesMadeC = MAX_MISTAKES - lives;
  const strikeLabelC = solvedGroups.length === PUZZLE.groups.length ? ['Beautiful Game','Single Strike','Double Strike','Triple Strike','Strike Out!'][mistakesMadeC] : 'Strike Out!';
  const text = `Footy Association - Game ${currentMatchweek + 1} - ${strikeLabelC}\n${lines}`;
  navigator.clipboard.writeText(text).then(() => showToast('Copied!'));
});

document.getElementById('btn-play-again').addEventListener('click', () => initGame(currentMatchweek));

// ─────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────
const CORRECT_SQUARE = '🟪';   // will be overridden by HTML render
const WRONG_SQUARE   = '⬛';   // black = wrong
function groupEmoji(gi) { return CORRECT_SQUARE; }

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────
initGame();

document.getElementById('btn-new-game').addEventListener('click', function() {
  initGame(getNextMatchweek());
});
</script>
